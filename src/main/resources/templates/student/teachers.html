<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Teachers</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">

    <link rel="stylesheet" th:href="@{/css/sidebar.css}">
</head>
<body>


<div th:replace="~{fragments/addside :: addside}"></div>

<div style="margin-left:250px;padding:25px;">

    <!-- Student Management Content -->

</div>


<div class="header">

    <h1 class="title">
        👨‍🏫 Teacher Management
    </h1>



</div>

<div class="table-container">

    <table>

        <thead>

        <tr>
            <th>ID</th>
            <th>Name</th>
            <th>Email</th>
            <th>Gender</th>
            <th>Qualification</th>
            <th>Phone</th>
            <th>Address</th>
            <th>Specialization</th>
            <th>Actions</th>
        </tr>

        </thead>

        <tbody>

        <tr th:each="teacher : ${teachers}">

            <td th:text="${teacher.teacherId}"></td>

            <td th:text="${teacher.teacherName}"></td>

            <td th:text="${teacher.teacherEmail}"></td>

            <td th:text="${teacher.teacherGender}"></td>

            <td th:text="${teacher.teacherHighestQualifications}"></td>

            <td th:text="${teacher.teacherPhoneNumber}"></td>

            <td th:text="${teacher.teacherAddress}"></td>

            <td th:text="${teacher.teacherSpecializations}"></td>

            <td>


            </td>

        </tr>

        </tbody>

    </table>

</div>

</body>
</html>
