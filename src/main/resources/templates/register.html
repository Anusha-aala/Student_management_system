<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

    <title>Register</title>

    <link rel="stylesheet" th:href="@{/css/login.css}">

</head>

<body>

<div class="login-container">

    <div class="login-box">

        <h1>Create Student Account</h1>

        <p>Register to Continue</p>

        <form th:action="@{/register}" method="post">

            <div class="input-box">
                <input type="text"
                       name="fullname"
                       placeholder="Full Name"
                       required>
            </div>

            <div class="input-box">
                <input type="text"
                       name="collegename"
                       placeholder="College Name"
                       required>
            </div>

            <div class="input-box">
                <input type="email"
                       name="userEmail"
                       placeholder="Email"
                       required>
            </div>

            <div class="input-box">
                <input type="text"
                       name="username"
                       placeholder="Username"
                       required>
            </div>

            <div class="input-box">
                <input type="password"
                       name="password"
                       placeholder="Password"
                       required>
            </div>

            <div class="input-box">
                <input type="password"
                       name="confirmPassword"
                       placeholder="Confirm Password"
                       required>
            </div>

            <button type="submit">

                Register

            </button>

        </form>

        <br>

        <p style="color:red;" th:text="${error}"></p>

        <br>

        <p>

            Already have an account?

            <a th:href="@{/login}">

                Login

            </a>

        </p>

    </div>

</div>

</body>

</html>
