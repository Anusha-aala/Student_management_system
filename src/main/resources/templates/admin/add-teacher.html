<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

    <meta charset="UTF-8">

    <title>Add Teacher</title>

    <link rel="stylesheet" th:href="@{/css/addstyle.css}">

</head>

<body class="student-bg">

<div class="overlay"></div>

<div class="container">

    <div class="form-box">

        <h1>Add Teacher</h1>

        <form th:action="@{/admin/teachers/save}" method="post">

            <label>Teacher Name</label>
            <input
                    type="text"
                    name="teacherName"
                    placeholder="Enter Teacher Name"
                    required>

            <label>Email</label>
            <input
                    type="email"
                    name="teacherEmail"
                    placeholder="Enter Email"
                    required>

            <label>Gender</label>
            <input
                    type="text"
                    name="teacherGender"
                    placeholder="Male / Female"
                    required>

            <label>Highest Qualification</label>
            <input
                    type="text"
                    name="teacherHighestQualifications"
                    placeholder="Enter Qualification"
                    required>

            <label>Phone Number</label>
            <input
                    type="number"
                    name="teacherPhoneNumber"
                    placeholder="Enter Phone Number"
                    required>

            <label>Address</label>
            <input
                    type="text"
                    name="teacherAddress"
                    placeholder="Enter Address"
                    required>

            <label>Specialization</label>
            <input
                    type="text"
                    name="teacherSpecializations"
                    placeholder="Enter Specialization"
                    required>

            <button type="submit">

                Save Teacher

            </button>

        </form>

    </div>

</div>

</body>
</html>
