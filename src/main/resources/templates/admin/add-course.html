<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

    <meta charset="UTF-8">

    <title>Add Course</title>

    <link rel="stylesheet" th:href="@{/css/addstyle.css}">

</head>

<body class="student-bg">

<div class="overlay"></div>

<div class="container">

    <div class="form-box">

        <h1>Add Course</h1>

        <form th:action="@{/admin/courses/save}" method="post">

            <label>Course Name</label>
            <input
                    type="text"
                    name="courseName"
                    placeholder="Enter Course Name"
                    required>

            <label>Credits</label>
            <input
                    type="number"
                    name="credits"
                    placeholder="Enter Credits"
                    required>

            <label>Semester</label>
            <input
                    type="number"
                    name="semester"
                    placeholder="Enter Semester"
                    required>

            <label>Department</label>
            <input
                    type="text"
                    name="departments"
                    placeholder="Enter Department"
                    required>

            <label>Duration (Months)</label>
            <input
                    type="number"
                    name="duration"
                    placeholder="Enter Duration"
                    required>

            <button type="submit">

                Save Course

            </button>

        </form>

    </div>

</div>

</body>

</html>
