<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

    <meta charset="UTF-8">

    <title>Add Student</title>

    <link rel="stylesheet" th:href="@{/css/addstyle.css}">

</head>

<body class="student-bg">

<div class="overlay"></div>

<div class="container">

    <div class="form-box">

        <h1>Add Student</h1>

        <form th:action="@{/admin/students/save}" method="post">

            <label>Name</label>
            <input
                    type="text"
                    name="name"
                    placeholder="Enter Student Name"
                    required>

            <label>Email</label>
            <input
                    type="email"
                    name="email"
                    placeholder="Enter Email"
                    required>

            <label>Course</label>
            <input
                    type="text"
                    name="course"
                    placeholder="Enter Course"
                    required>

            <label>Phone Number</label>
            <input
                    type="text"
                    name="phoneNumber"
                    placeholder="Enter Phone Number"
                    required>

            <label>Address</label>
            <input
                    type="text"
                    name="address"
                    placeholder="Enter Address"
                    required>

            <label>Gender</label>
            <input
                    type="text"
                    name="gender"
                    placeholder="Male / Female"
                    required>

            <label>Courses Completed</label>
            <input
                    type="text"
                    name="coursesCompleted"
                    placeholder="Enter Completed Courses"
                    required>

            <label>Current Year</label>
            <input
                    type="number"
                    name="currentYear"
                    placeholder="Current Year"
                    required>

            <button type="submit">

                Save Student

            </button>

        </form>

    </div>

</div>

</body>

</html>
