<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

    <meta charset="UTF-8">

    <title>Edit Course</title>

    <link rel="stylesheet" th:href="@{/css/addstyle.css}">

</head>

<body class="student-bg">

<div class="overlay"></div>

<div class="container">

    <div class="form-box">

        <h1>Edit Course</h1>

        <form
                th:action="@{'/admin/courses/update/' + ${course.courseId}}"
                method="post">

            <input
                    type="hidden"
                    name="courseId"
                    th:value="${course.courseId}">

            <label>Course Name</label>
            <input
                    type="text"
                    name="courseName"
                    th:value="${course.courseName}"
                    required>

            <label>Credits</label>
            <input
                    type="number"
                    name="credits"
                    th:value="${course.credits}"
                    required>

            <label>Semester</label>
            <input
                    type="number"
                    name="semester"
                    th:value="${course.semester}"
                    required>

            <label>Department</label>
            <input
                    type="text"
                    name="departments"
                    th:value="${course.departments}"
                    required>

            <label>Duration (Months)</label>
            <input
                    type="number"
                    name="duration"
                    th:value="${course.duration}"
                    required>

            <button type="submit">

                Update Course

            </button>

        </form>

    </div>

</div>

</body>

</html>
