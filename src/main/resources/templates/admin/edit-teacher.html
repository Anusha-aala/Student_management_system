<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

    <meta charset="UTF-8">

    <title>Edit Teacher</title>

    <link rel="stylesheet" th:href="@{/css/addstyle.css}">

</head>

<body class="student-bg">

<div class="overlay"></div>

<div class="container">

    <div class="form-box">

        <h1>Edit Teacher</h1>

        <form
                th:action="@{'/admin/teachers/update/' + ${teacher.teacherId}}"
                method="post">

            <input
                    type="hidden"
                    name="teacherId"
                    th:value="${teacher.teacherId}">

            <label>Teacher Name</label>
            <input
                    type="text"
                    name="teacherName"
                    th:value="${teacher.teacherName}"
                    required>

            <label>Email</label>
            <input
                    type="email"
                    name="teacherEmail"
                    th:value="${teacher.teacherEmail}"
                    required>

            <label>Gender</label>
            <input
                    type="text"
                    name="teacherGender"
                    th:value="${teacher.teacherGender}"
                    required>

            <label>Highest Qualification</label>
            <input
                    type="text"
                    name="teacherHighestQualifications"
                    th:value="${teacher.teacherHighestQualifications}"
                    required>

            <label>Phone Number</label>
            <input
                    type="number"
                    name="teacherPhoneNumber"
                    th:value="${teacher.teacherPhoneNumber}"
                    required>

            <label>Address</label>
            <input
                    type="text"
                    name="teacherAddress"
                    th:value="${teacher.teacherAddress}"
                    required>

            <label>Specialization</label>
            <input
                    type="text"
                    name="teacherSpecializations"
                    th:value="${teacher.teacherSpecializations}"
                    required>

            <button type="submit">

                Update Teacher

            </button>

        </form>

    </div>

</div>

</body>

</html>
