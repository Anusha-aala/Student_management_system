<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

    <meta charset="UTF-8">

    <title>Edit Student</title>

    <link rel="stylesheet" th:href="@{/css/addstyle.css}">

</head>

<body class="student-bg">

<div class="overlay"></div>

<div class="container">

    <div class="form-box">

        <h1>Edit Student</h1>

        <form th:action="@{'/admin/students/update/' + ${student.studentId}}"
              method="post">

            <input type="hidden"
                   name="studentId"
                   th:value="${student.studentId}">

            <label>Student Name</label>
            <input type="text"
                   name="name"
                   th:value="${student.name}"
                   required>

            <label>Email</label>
            <input type="email"
                   name="email"
                   th:value="${student.email}"
                   required>

            <label>Course</label>
            <input type="text"
                   name="course"
                   th:value="${student.course}"
                   required>

            <label>Phone Number</label>
            <input type="text"
                   name="phoneNumber"
                   th:value="${student.phoneNumber}"
                   required>

            <label>Address</label>
            <input type="text"
                   name="address"
                   th:value="${student.address}"
                   required>

            <label>Gender</label>
            <input type="text"
                   name="gender"
                   th:value="${student.gender}"
                   required>

            <label>Courses Completed</label>
            <input type="text"
                   name="CoursesCompleted"
                   th:value="${student.CoursesCompleted}"
                   required>

            <label>Current Year</label>
            <input type="number"
                   name="currentYear"
                   th:value="${student.currentYear}"
                   required>

            <button type="submit">

                Update Student

            </button>

        </form>

    </div>

</div>

</body>
</html>
