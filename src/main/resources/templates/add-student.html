<!DOCTYPE html>

<html xmlns:th="http://www.thymeleaf.org">

<body>

<h2>Add Student</h2>

<form th:action="@{/admin/students/save}" method="post">

    <input
            type="text"
            name="name"
            placeholder="Name"
            required>
    <br><br>

    <input
            type="email"
            name="email"
            placeholder="Email"
            required>
    <br><br>

    <input
            type="text"
            name="course"
            placeholder="Course"
            required>
    <br><br>

    <input
            type="text"
            name="phoneNumber"
            placeholder="Phone Number"
            required>
    <br><br>

    <input
            type="text"
            name="address"
            placeholder="Address"
            required>
    <br><br>

    <input
            type="text"
            name="gender"
            placeholder="Gender"
            required>
    <br><br>

    <input
            type="text"
            name="coursesCompleted"
            placeholder="Courses Completed"
            required>
    <br><br>

    <input
            type="number"
            name="currentYear"
            placeholder="Current Year"
            required>
    <br><br>

    <button type="submit">
        Save
    </button>

</form>

</body>

</html>
